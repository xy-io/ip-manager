name: Create Release

# Fires automatically on every push to main.
# Reads the version from package.json, checks if a release already
# exists for that version, and creates one if not.
# No tags, no manual steps — just push from GitHub Desktop as normal.

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read previous tags

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"         >> $GITHUB_OUTPUT
          echo "Detected version: ${TAG}"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if gh release view "${TAG}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "exists=true"  >> $GITHUB_OUTPUT
            echo "Release ${TAG} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No release for ${TAG} — will create one."
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Python reads CHANGELOG.md directly from disk and writes the release
          # notes to a file. The changelog content never passes through the shell,
          # so backticks, double-quotes, globs, and other special characters in
          # release notes are completely safe.
          python3 - <<'PYEOF'
          import os, re

          tag  = os.environ["TAG"]   # e.g. "v1.24.0" — also try "v1.24"
          text = open("CHANGELOG.md").read()

          # Try exact tag first, then without the patch segment (v1.20.0 → v1.20)
          def find_section(t):
              pattern = rf"^## {re.escape(t)}\s*\n(.*?)(?=\n---|\Z)"
              m = re.search(pattern, text, re.DOTALL | re.MULTILINE)
              return m.group(1).strip() if m else None

          body = find_section(tag)
          if body is None:
              short_tag = re.sub(r'(\.\d+)$', '', tag)
              body = find_section(short_tag)
          if body is None:
              body = f"Release {tag}"

          with open('/tmp/release_notes.md', 'w') as f:
              f.write(body)
          PYEOF

          gh release create "${TAG}" \
            --repo "${GH_REPO}" \
            --title "${TAG}" \
            --notes-file /tmp/release_notes.md
