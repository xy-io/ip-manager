name: Create Release

# Two ways to trigger:
#
#   1. Push a tag — git tag v1.21 && git push origin v1.21
#      (for power users / CI)
#
#   2. Manual — go to GitHub.com → Actions → "Create Release" → "Run workflow"
#      Type the version (e.g. v1.21) and click the green button.
#      No terminal required.

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.21)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Extract the changelog section that matches this version.
      # CHANGELOG.md uses "## v1.20" headings separated by "---" lines.
      - name: Extract changelog section
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys

          tag     = os.environ["TAG"]
          cl_path = "CHANGELOG.md"

          try:
              text = open(cl_path).read()
          except FileNotFoundError:
              body = f"Release {tag}"
          else:
              pattern = rf"^## {re.escape(tag)}\s*\n(.*?)(?=\n---|\Z)"
              m = re.search(pattern, text, re.DOTALL | re.MULTILINE)
              body = m.group(1).strip() if m else f"Release {tag}"

          delimiter = "CHANGELOG_EOF"
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"body<<{delimiter}\n{body}\n{delimiter}\n")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.version.outputs.tag }}
          name:       ${{ steps.version.outputs.tag }}
          body:       ${{ steps.changelog.outputs.body }}
          draft:      false
          prerelease: false
