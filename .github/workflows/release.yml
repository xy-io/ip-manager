name: Create Release

# Fires automatically on every push to main.
# Reads the version from package.json, checks if a release already
# exists for that version, and creates one if not.
# No tags, no manual steps — just push from GitHub Desktop as normal.

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so we can read previous tags

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"         >> $GITHUB_OUTPUT
          echo "Detected version: ${TAG}"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if gh release view "${TAG}" --repo ${{ github.repository }} > /dev/null 2>&1; then
            echo "exists=true"  >> $GITHUB_OUTPUT
            echo "Release ${TAG} already exists — skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No release for ${TAG} — will create one."
          fi

      - name: Extract changelog section
        if: steps.check.outputs.exists == 'false'
        id: changelog
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          python3 - <<'PYEOF'
          import os, re

          tag  = os.environ["TAG"]   # e.g. "v1.20.0" — also try "v1.20"
          text = open("CHANGELOG.md").read()

          # Try exact tag first, then without the patch segment (v1.20.0 → v1.20)
          def find_section(t):
              pattern = rf"^## {re.escape(t)}\s*\n(.*?)(?=\n---|\Z)"
              m = re.search(pattern, text, re.DOTALL | re.MULTILINE)
              return m.group(1).strip() if m else None

          body = find_section(tag)
          if body is None:
              # Strip patch version: v1.20.0 → v1.20
              short_tag = re.sub(r'(\.\d+)$', '', tag)
              body = find_section(short_tag)
          if body is None:
              body = f"Release {tag}"

          delimiter = "CHANGELOG_EOF"
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"body<<{delimiter}\n{body}\n{delimiter}\n")
          PYEOF

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BODY: ${{ steps.changelog.outputs.body }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          # Write notes via Python so no shell-special characters are interpreted
          # (backticks, double-quotes, globs, etc. in CHANGELOG are all safe this way)
          python3 -c "import os; open('/tmp/release_notes.md','w').write(os.environ['RELEASE_BODY'])"
          gh release create "${TAG}" \
            --repo ${{ github.repository }} \
            --title "${TAG}" \
            --notes-file /tmp/release_notes.md
